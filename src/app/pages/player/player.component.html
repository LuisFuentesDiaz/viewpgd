<div class="player-page">
  <header class="player-header">
    <button type="button" class="btn-back" (click)="goBack()" aria-label="Volver">
      ← Volver
    </button>
    <h1 class="player-title">{{ title() }}</h1>
  </header>

  @if (videoUrl(); as url) {
    <div class="video-wrap">
      <iframe
        class="video"
        [src]="url"
        title="Reproductor"
        allow="fullscreen; autoplay; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  } @else {
    <div class="no-video">
      <p>No hay ningún video. <a routerLink="/catalog">Elige una película en el catálogo</a>.</p>
    </div>
  }
</div>
